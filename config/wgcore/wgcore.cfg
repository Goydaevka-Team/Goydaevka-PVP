# Configuration file

##########################################################################################################
# 01_territory
#--------------------------------------------------------------------------------------------------------#
# Territory, core, claim, and relocation values.
# Contains both live and NOT-LIVE settings.
##########################################################################################################

01_territory {
    # Square diameter in chunks for the initial core claim area. Must remain odd.
    I:coreClaimDiameter=5

    # Horizontal block radius for the local protected envelope around a placed live Core Flag. This hardening applies to break, place, and explosion protection and also protects the support block below the flag.
    I:coreFlagProtectionRadiusBlocks=2

    # Minimum minutes a faction must wait after a successful primary core relocation before starting another one.
    I:coreRelocationCooldownMinutes=120

    # Minimum chunk distance a relocation target must keep from the faction's current primary core-network claims.
    I:coreRelocationMinDistanceFromOwnPrimaryClaims=4

    # Time in seconds before a placed core relocation flag auto-cancels if not confirmed.
    I:coreRelocationPlacedTimeoutSeconds=300

    # Maximum chunk distance an expansion claim may extend from the faction's core territory.
    I:maxExpansionDistanceFromCore=8

    # Minimum chunk distance from Safezone, Warzone, Resource Node, and Monument zones for claim placement.
    I:minDistanceFromAdministrativeZones=2

    # Minimum chunk distance from another faction's territory for core placement.
    I:minDistanceFromOtherFactionClaims=2

    # NOT-LIVE. If true, future relocation authority may prune expansions that fall outside the new allowed range.
    B:relocationRemoveOutOfRangeExpansions=true
}


##########################################################################################################
# 02_war
#--------------------------------------------------------------------------------------------------------#
# War lifecycle, declaration, duration, and leaderboard values.
# Contains both live and NOT-LIVE settings.
##########################################################################################################

02_war {
    # Minutes the capture phase lasts before the war moves into cooldown.
    I:captureDurationMinutes=20

    # Whether combat-tagged players are blocked from entering Safezone.
    B:combatTagBlockSafezoneEntryEnabled=true

    # Whether disconnecting while combat-tagged applies a stored combat-log penalty.
    B:combatTagDisconnectPenaltyEnabled=true

    # How many seconds a valid hostile combat tag lasts before expiring.
    I:combatTagDurationSeconds=30

    # Whether combat tagging is enabled for valid hostile player-vs-player combat events.
    B:combatTagEnabled=true

    # How long a stored combat-log penalty remains active after a tagged logout.
    I:combatTagLogoutPenaltySeconds=30

    # Minutes of cooldown applied after a war ends.
    I:cooldownDurationMinutes=10

    # NOT-LIVE. Whether eligible special territories should count toward automatic victory threshold.
    B:countSpecialTerritoriesTowardVictoryThreshold=false

    # Minimum defender online percentage required to declare war. 0 disables the requirement.
    I:declarationDefenderOnlinePercent=0

    # How many seconds a player must stand still before /wg home or /wg warp actually teleports them.
    I:factionTeleportWarmupSeconds=3

    # How many factions /wg war top should display before optionally showing the player's current faction rank.
    I:leaderboardDisplaySize=3

    # How many seconds a faction may remain below the offline pause threshold during a war before pause behaviour may begin.
    I:offlineGraceDurationSeconds=300

    # Whether wars should track faction offline grace and support pause gating once the configured threshold is missed.
    B:offlineGraceEnabled=true

    # Minimum online percentage each faction must maintain during war to avoid consuming offline grace. 0 disables offline pause threshold checks.
    I:offlinePauseOnlinePercentThreshold=1

    # If true, active wars pause progression once a faction stays below the offline threshold beyond the configured offline grace duration.
    B:offlinePauseWhenThresholdNotMet=true

    # Seconds that a losing faction is blocked from re-expanding into its own chunks that were stripped to wilderness by non-core partial war loss resolution.
    I:partialLossReexpandCooldownSeconds=1800

    # Minutes between a successful war declaration and the start of the raiding phase.
    I:preparationDurationMinutes=10

    # Minutes the raiding phase lasts before the capture phase begins.
    I:raidingDurationMinutes=30

    # Whether /wg war top should show the player's current faction ranking when it falls outside the visible leaderboard.
    B:showCurrentFactionRankingOutsideLeaderboard=true

    # NOT-LIVE. Automatic victory threshold based on enemy territory percentage. 0 disables territory-threshold victory.
    I:territoryVictoryThresholdPercent=0

    # Exact item or block registry IDs that may be placed in enemy claims during war when normal PLACE permission is denied.
    # This is intended for demolition charges and similar raid-only placement items.
    # Format: modid:name
    # No wildcards are supported.
    # Add both the held item ID and placed block ID if they differ.
    S:warAllowedPlacementIds <
     >
}


##########################################################################################################
# 03_capture
#--------------------------------------------------------------------------------------------------------#
# Capture progression and capture-flag protection tuning.
# Contains both live and NOT-LIVE settings.
##########################################################################################################

03_capture {
    # Control progress removed per adjacent defending player per tick.
    D:adjacentDefenderDecreasePerTick=0.0

    # NOT-LIVE. If true, adjacent defenders may fully stall progress instead of only applying adjacentDefenderDecreasePerTick.
    B:adjacentDefenderStallsProgress=true

    # Maximum number of active capture flags a faction may have at once.
    I:maxActiveFlagsPerFaction=2

    # Maximum total control progress that attackers may add per tick in a capture chunk.
    D:maxProgressIncreasePerTick=4.0

    # Control progress removed per tick when a capture chunk has no attackers present.
    D:noAttackerDecayPerTick=1.0

    # Control progress added per attacking player per tick in a capture chunk.
    D:progressIncreasePerAttackerPerTick=1.0

    # Horizontal block radius around a placed live capture flag that blocks nearby placement.
    I:protectedPlacementRadiusBlocks=3

    # Control progress removed per defending player per tick when defenders are inside the same capture chunk.
    D:sameChunkDefenderDecreasePerTick=1.0
}


##########################################################################################################
# 04_control
#--------------------------------------------------------------------------------------------------------#
# Control decay, warning, and restoration tuning.
# Contains both live and NOT-LIVE settings.
##########################################################################################################

04_control {
    # NOT-LIVE. Interval in minutes for future scheduled control decay processing.
    I:decayIntervalMinutes=60

    # NOT-LIVE. Minimum enemy online percentage required for future control actions. 0 disables the requirement.
    I:enemyOnlineRequirementPercent=0

    # NOT-LIVE. If true, future recapture behaviour may require eligible online enemy presence.
    B:onlineOnlyRecaptureEnabled=false

    # Whether passive non-war control decay is enabled globally. When false, passive decay progression, warnings, and passive uncontrolled transitions are fully disabled.
    B:passiveControlDecayEnabled=true

    # How long passive decay takes to reduce owner-controlled main core control from its current value to zero once decay has started.
    I:passiveDecayCoreDurationMinutes=60

    # How long an owner-controlled main core chunk may go without eligible faction presence before passive decay begins.
    I:passiveDecayCoreGracePeriodMinutes=60

    # How long passive decay takes to reduce owner-controlled normal claim control from its current value to zero once decay has started.
    I:passiveDecayDurationMinutes=60

    # How long passive decay takes to reduce owner-controlled FOB core control from its current value to zero once decay has started.
    I:passiveDecayFobCoreDurationMinutes=60

    # How long an owner-controlled FOB core chunk may go without eligible faction presence before passive decay begins.
    I:passiveDecayFobCoreGracePeriodMinutes=60

    # How long passive decay takes to reduce owner-controlled FOB expansion control from its current value to zero once decay has started.
    I:passiveDecayFobExpansionDurationMinutes=60

    # How long an owner-controlled FOB expansion chunk may go without eligible faction presence before passive decay begins.
    I:passiveDecayFobExpansionGracePeriodMinutes=60

    # How long an owner-controlled normal claim may go without eligible faction presence before passive decay begins.
    I:passiveDecayGracePeriodMinutes=60

    # NOT-LIVE. Duration in seconds for future timed control restoration behaviour.
    I:restoreDurationSeconds=30

    # Control percentage at or below which passive-decay warning messaging becomes eligible.
    I:warningThresholdPercent=10
}


##########################################################################################################
# 05_fob
#--------------------------------------------------------------------------------------------------------#
# Forward operating base limits, spacing, and lifecycle tuning.
# Deprecated compatibility keys may also appear here.
##########################################################################################################

05_fob {
    # DEPRECATED / IGNORED. FOB legality now always requires WILDERNESS placement. This key is retained only for old config compatibility.
    B:allowNonWildernessPlacement=false

    # Maximum total chunks claimable from a single FOB.
    I:maxClaimableChunks=25

    # Maximum chunk radius that FOB expansion may extend from the FOB core.
    I:maxExpansionRadius=4

    # Maximum number of FOB cores a faction may have at once.
    I:maxPerFaction=1

    # Minimum age in minutes before a faction may abandon its FOB.
    I:minAgeBeforeAbandonMinutes=60

    # Minimum chunk distance from any other active FOB core.
    I:minDistanceBetweenFobs=8

    # Minimum chunk distance from the faction's primary core claim center.
    I:minDistanceFromPrimaryCore=8

    # Explicit FOB lifecycle mode. Valid values: PERSISTENT or WAR_BOUND. This supersedes requireActiveWarToExist.
    S:mode=PERSISTENT

    # DEPRECATED compatibility key. Explicit FOB mode now controls lifecycle intent. If mode is absent or invalid, true maps to WAR_BOUND and false maps to PERSISTENT.
    B:requireActiveWarToExist=false

    # Warning timing before war-bound FOB removal.
    I:warBoundRemovalWarningMinutes=5
}


##########################################################################################################
# 06_resource_nodes
#--------------------------------------------------------------------------------------------------------#
# NOT-LIVE. Resource node capture, duration, production, territory, and announcement tuning.
##########################################################################################################

06_resource_nodes {
    # NOT-LIVE. If true, resource nodes may automatically claim a surrounding territory ring.
    B:autoRingClaimEnabled=false

    # NOT-LIVE. Minutes a captured resource node remains under one faction's control before expiry or turnover.
    I:controlDurationMinutes=120

    # NOT-LIVE. If true, resource node capture events may broadcast globally.
    B:globalCaptureBroadcastEnabled=true

    # NOT-LIVE. If true, offline raiding rules may allow resource node capture without online defenders.
    B:offlineRaidingAllowed=true

    # NOT-LIVE. Minimum defender online percentage required for resource node capture. 0 disables the requirement.
    I:onlineRequirementPercent=0

    # NOT-LIVE. Interval in minutes between resource node reminder broadcasts.
    I:reminderIntervalMinutes=30

    # NOT-LIVE. Territory radius in chunks reserved around a resource node.
    I:territoryRadiusChunks=4

    # NOT-LIVE. Capture duration in seconds for a tier 1 resource node.
    I:tier1CaptureDurationSeconds=60

    # NOT-LIVE. Production value granted by a tier 1 resource node.
    I:tier1ProductionValue=1

    # NOT-LIVE. Capture duration in seconds for a tier 2 resource node.
    I:tier2CaptureDurationSeconds=120

    # NOT-LIVE. Production value granted by a tier 2 resource node.
    I:tier2ProductionValue=2

    # NOT-LIVE. Capture duration in seconds for a tier 3 resource node.
    I:tier3CaptureDurationSeconds=180

    # NOT-LIVE. Production value granted by a tier 3 resource node.
    I:tier3ProductionValue=3
}


##########################################################################################################
# 07_monuments
#--------------------------------------------------------------------------------------------------------#
# NOT-LIVE. Monument timing, permit, and announcement tuning.
##########################################################################################################

07_monuments {
    # NOT-LIVE. Cooldown in minutes before another monument attempt may begin.
    I:attemptCooldownMinutes=30

    # NOT-LIVE. If true, monument attempt-start broadcasts may be announced globally.
    B:broadcastAttemptStarted=true

    # NOT-LIVE. If true, monument failure broadcasts may be announced globally.
    B:broadcastFailure=true

    # NOT-LIVE. If true, monument success broadcasts may be announced globally.
    B:broadcastSuccess=true

    # NOT-LIVE. Maximum number of duplicate monument permits that may exist for the same monument outcome.
    I:permitDuplicationCap=5

    # NOT-LIVE. Per-player cooldown in minutes after completing a monument.
    I:playerCompletionCooldownMinutes=1440

    # NOT-LIVE. Seconds of invincibility granted after a successful monument completion.
    I:successInvincibilitySeconds=60
}


##########################################################################################################
# 08_rewards
#--------------------------------------------------------------------------------------------------------#
# War reward-point values.
# Runtime war rewards are consumed by the war reward service and remain positive-only.
##########################################################################################################

08_rewards {
    # Per-faction points for an admin-ended war if this outcome is enabled.
    I:adminInterventionPoints=0

    # If true, both factions receive trucePoints on a truce. If false, truce points are not awarded.
    B:awardBothFactionsOnTruce=false

    # Positive-only points for a full victory, including core-capture collapse wins.
    I:fullVictoryPoints=10

    # DEPRECATED. Compatibility placeholder. Losses always award 0 and this remains fixed at 0.
    I:lossPoints=0

    # Positive-only points for a time-expiration or other non-core win outcome.
    I:timeExpirationVictoryPoints=5

    # Per-faction truce points when truce rewards are enabled.
    I:trucePoints=0
}


##########################################################################################################
# 09_chat
#--------------------------------------------------------------------------------------------------------#
# Faction chat and presentation-related limits.
##########################################################################################################

09_chat {
    # Maximum number of visible characters allowed in a faction chat tag.
    I:maxFactionTagLength=5

    # Minimum number of visible characters required for a faction chat tag.
    I:minFactionTagLength=1
}


##########################################################################################################
# 10_faction
#--------------------------------------------------------------------------------------------------------#
# Faction naming and warp naming limits.
##########################################################################################################

10_faction {
    # Optional console command run for the player who successfully places their faction's first real main core. Supports {player}. Leave blank to disable.
    S:factionFirstCoreRewardCommand=

    # Player-based cooldown in seconds before that same player may receive the first-main-core reward again.
    I:factionFirstCoreRewardCooldownSeconds=0

    # Player-based cooldown in seconds blocking that rewarded player from joining another faction after the reward is actually granted.
    I:factionPostRewardJoinCooldownSeconds=0

    # Maximum visible character length allowed for faction names.
    I:maxFactionNameLength=16

    # Maximum visible character length allowed for faction warp names.
    I:maxFactionWarpNameLength=24

    # Minimum visible character length required for faction names.
    I:minFactionNameLength=3
}


##########################################################################################################
# 11_commands
#--------------------------------------------------------------------------------------------------------#
# Shared command help and presentation values.
##########################################################################################################

11_commands {
    # How many visible subcommands each root command help page should show.
    I:helpPageSize=8
}


##########################################################################################################
# 12_admin
#--------------------------------------------------------------------------------------------------------#
# Admin-only WGCore command presentation values.
##########################################################################################################

12_admin {
    # How many entries /wgc war status and /wgc war logs show per page.
    I:warPageSize=8
}


##########################################################################################################
# 13_integrations
#--------------------------------------------------------------------------------------------------------#
# NOT-LIVE. External integration restrictions.
##########################################################################################################

13_integrations {
    # NOT-LIVE. Minimum block distance from another faction's core for MCHELI placement.
    I:mcheliMinDistanceFromEnemyCoreBlocks=128
}


##########################################################################################################
# 14_partial_explosions
#--------------------------------------------------------------------------------------------------------#
# Partial explosion block damage, healing, and crack-overlay visual sync settings.
##########################################################################################################

14_partial_explosions {
    # Exact block registry names that are always protected from explosion block damage, even during war.
    # These blocks receive no partial explosion damage and are removed from all explosion break lists.
    # Format: modid:block_name
    # No wildcards are supported.
    # Example: hbm:some_drive_block
    S:alwaysExplosionProtectedBlocks <
     >

    # Per-block effective explosion resistance overrides used only by WGCore partial block damage.
    # Format: modid:block_name=value
    # Lower value means the block takes more partial damage.
    # Default: minecraft:obsidian=50.0
    # Example: hbm:sliding_seal_door=500.0
    S:blockEffectiveResistanceOverrides <
        minecraft:obsidian=50.0
     >

    # How often damaged blocks heal. 20 ticks = 1 second.
    I:healIntervalTicks=20

    # Maximum damaged block entries processed by healing per healing pass.
    I:healMaxEntriesPerTick=256

    # Percent of each damaged block's break threshold healed per second. 0 disables healing.
    D:healPercentPerSecond=1.0

    # Radius in blocks where players holding the Partial Damage Inspector can see damaged blocks, even after normal visual timeout.
    I:inspectorRadiusBlocks=64

    # Multiplier applied to WGCore partial block damage for HBM/NTM ExplosionNT explosions, including MCHR weapons using ExplosionType=hbmNT_Bomb.
    D:ntmExplosionPartialDamageMultiplier=4.0

    # Hard cap for damaged block crack entries sent to one player per sync.
    I:visualMaxEntriesPerPlayer=128

    # Radius in blocks where normal players can see fresh partial explosion damage crack overlays.
    I:visualRadiusBlocks=24

    # How often the server syncs visible partial explosion crack overlays. 20 ticks = 1 second.
    I:visualSyncIntervalTicks=10

    # How many seconds newly damaged blocks show vanilla crack overlays to normal players.
    I:visualVisibleSeconds=30

    # Multiplier applied to WGCore partial block damage for HBM/NTM ExplosionVNT explosions, including timed charges and VNT-backed projectiles.
    D:vntExplosionPartialDamageMultiplier=4.0
}


