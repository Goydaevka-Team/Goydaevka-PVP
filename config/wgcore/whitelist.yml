# WGCore territory interaction whitelist
#
# This file controls location-based whitelist actions for zones and other-faction claims.
# Own-faction claim permissions remain handled separately by the territory permission system.

safezone:
  minecraft:chest:
    actions:
      - interact
      - inventoryclick
  minecraft:lever:
    actions:
      - click
      - interact
  minecraft:wooden_door:
    actions:
      - click
      - interact

warzone:
  minecraft:chest:
    actions:
      - interact
      - inventoryclick
  minecraft:wooden_door:
    actions:
      - click
      - interact

resource_node:
  minecraft:chest:
    actions:
      - interact
      - inventoryclick

claims:
  out_of_war:
    minecraft:tnt:
      actions:
        - place
  during_war:
    minecraft:tnt:
      actions:
        - place
        - use
  offline: {}
